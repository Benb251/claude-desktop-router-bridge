<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chrono Spirit | Bảng điều khiển bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header id="statusCanopy" class="status-canopy glass-panel glass-primary"></header>

      <main class="control-center">
        <aside id="slotNavigator" class="slot-navigator glass-panel glass-secondary"></aside>
        <section id="routeStudio" class="route-studio glass-panel glass-primary"></section>
        <aside id="catalogBrowser" class="catalog-browser glass-panel glass-secondary"></aside>
      </main>

      <div id="applyDock" class="dock-layer"></div>
      <div id="utilityDrawer" class="drawer-layer hidden"></div>
      <div id="modalLayer" class="modal-layer hidden"></div>
    </div>

    <input id="profileFileInput" type="file" accept="application/json,.json" hidden>
    <script type="module" src="/app.js"></script>
  </body>
</html>
